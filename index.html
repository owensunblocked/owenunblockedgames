<!DOCTYPE html>
<html>
<head>
  <title>ZpiceFab Pro</title>
  <style>
    body { font-family: Arial; background:#111; color:white; }
    input, button { margin:5px; }
    .model { border:1px solid #444; padding:10px; margin:10px; }
  </style>
</head>
<body>

<h1>ZpiceFab Pro</h1>

<!-- AUTH -->
<div>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<hr>

<!-- UPLOAD -->
<h2>Upload Model</h2>
<input id="title" placeholder="Model Title (required)">
<br>
<input type="file" id="file" accept=".glb,.gltf,.fbx,.obj,.stl,.dae">
<label>
  <input type="checkbox" id="isPublic"> Public
</label>
<br>
<button onclick="upload()">Upload</button>

<hr>

<!-- SEARCH -->
<h2>Search Models</h2>
<input id="search" placeholder="Search by title..." oninput="searchModels()">

<hr>

<h2>Public Models</h2>
<div id="publicModels"></div>

<h2>My Models</h2>
<div id="myModels"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA6YRP3Ec8DLN_lXvftF6bp4kXXGfm0m3U",
  authDomain: "umyyuy-70e45.firebaseapp.com",
  projectId: "umyyuy-70e45",
  storageBucket: "umyyuy-70e45.firebasestorage.app",
  messagingSenderId: "485399435278",
  appId: "1:485399435278:web:e14da3dd8b11059b81845f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const storage = getStorage();

let allPublicModels = [];

// AUTH
window.signup = async () => {
  await createUserWithEmailAndPassword(auth, email.value, password.value);
  alert("Signed up!");
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
  loadModels();
};

window.logout = async () => {
  await signOut(auth);
};

// UPLOAD
window.upload = async () => {
  const file = document.getElementById("file").files[0];
  const isPublic = document.getElementById("isPublic").checked;
  const title = document.getElementById("title").value.trim();

  if (!title) return alert("Title is required!");
  if (!file) return alert("Pick a file");

  const type = file.name.split('.').pop().toLowerCase();

  const storageRef = ref(storage, "models/" + Date.now() + "_" + file.name);
  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "models"), {
    title,
    url,
    user: auth.currentUser.uid,
    public: isPublic,
    type
  });

  alert("Uploaded!");
  loadModels();
};

// MODEL CARD
function createModelCard(data) {
  let preview = "";

  if (data.type === "glb" || data.type === "gltf") {
    preview = `<model-viewer src="${data.url}" auto-rotate camera-controls style="width:300px;height:200px;"></model-viewer>`;
  } else {
    preview = `<p>Preview not supported (${data.type})</p>`;
  }

  return `
    <div class="model">
      <b>${data.title}</b><br>
      ${preview}
      <br>
      <a href="${data.url}" target="_blank">Download</a>
    </div>
  `;
}

// LOAD MODELS
async function loadModels() {
  publicModels.innerHTML = "";
  myModels.innerHTML = "";
  allPublicModels = [];

  const q1 = query(collection(db, "models"), where("public", "==", true));
  const publicSnap = await getDocs(q1);

  publicSnap.forEach(doc => {
    const data = doc.data();
    allPublicModels.push(data);
    publicModels.innerHTML += createModelCard(data);
  });

  if (!auth.currentUser) return;

  const q2 = query(collection(db, "models"), where("user", "==", auth.currentUser.uid));
  const mySnap = await getDocs(q2);

  mySnap.forEach(doc => {
    myModels.innerHTML += createModelCard(doc.data());
  });
}

// 🔍 SEARCH
window.searchModels = () => {
  const term = document.getElementById("search").value.toLowerCase();

  publicModels.innerHTML = "";

  allPublicModels
    .filter(m => m.title.toLowerCase().includes(term))
    .forEach(m => {
      publicModels.innerHTML += createModelCard(m);
    });
};

</script>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</body>
</html>
