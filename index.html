<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Portal</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

.container{
  padding:40px 20px;
  max-width:900px;
  margin:auto;
}

h1{
  font-size:48px;
  margin-bottom:10px;
}

.card{
  background:rgba(255,255,255,0.08);
  border-radius:16px;
  padding:30px;
  margin-top:30px;
  box-shadow:0 0 25px rgba(0,0,0,.4);
}

.gameTitle{
  font-size:36px;
  margin-bottom:10px;
}

.desc{
  opacity:.85;
  margin-bottom:25px;
  line-height:1.6;
}

.playBtn{
  font-size:26px;
  padding:15px 50px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  box-shadow:0 0 20px rgba(0,150,255,.6);
  transition:.25s;
}

.playBtn:hover{
  transform:scale(1.08);
}

.note{
  margin-top:20px;
  font-size:14px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎮 Game Portal</h1>

  <div class="card">
    <div class="gameTitle">Grow A Garden</div>
    <div class="desc">
      🌱 Relaxing farming game<br>
      🪴 Plant crops and grow your garden<br>
      💰 Earn coins and expand your land<br><br>
      Click play to start the game.
    </div>

    <button class="playBtn" onclick="playGame()">▶ Play Game</button>

    <div class="note">
      If the game doesn't start, the game file is missing.
    </div>
  </div>
</div>

<script>
function playGame(){
  window.location.href = "growagarden.html";
}
</script>

</body>
</html>
