<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zpice FPS</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(135deg, #000000, #2a004f, #5a00a3);
}

/* Menu UI */
.menu {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    color: white;
    box-shadow: 0 0 20px purple;
}

button {
    padding: 10px 20px;
    margin: 10px;
    background: purple;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#gameMenu { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginMenu" class="menu">
    <h1>Zpice</h1>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- PLAY MENU -->
<div id="gameMenu" class="menu">
    <h1>Menu</h1>
    <button onclick="startGame()">PLAY</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/PointerLockControls.js"></script>

<script>
// fake login
function login(){
    document.getElementById("loginMenu").style.display="none";
    document.getElementById("gameMenu").style.display="block";
}

// START GAME
function startGame(){
    document.getElementById("gameMenu").style.display="none";
    initGame();
}

let camera, scene, renderer, controls;
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();
let move = { forward:false, back:false, left:false, right:false };

function initGame(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x220033);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 1, 1000);

    renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.PointerLockControls(camera, document.body);

    document.body.addEventListener('click', () => {
        controls.lock();
    });

    scene.add(controls.getObject());

    // floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(100,100),
        new THREE.MeshBasicMaterial({ color: 0x5500aa, wireframe:true })
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // cubes (minecraft style)
    for(let i=0;i<50;i++){
        const cube = new THREE.Mesh(
            new THREE.BoxGeometry(),
            new THREE.MeshBasicMaterial({ color: Math.random()*0xffffff })
        );
        cube.position.set(
            Math.random()*50-25,
            0.5,
            Math.random()*50-25
        );
        scene.add(cube);
    }

    // controls
    document.addEventListener('keydown', e=>{
        if(e.code==="KeyW") move.forward=true;
        if(e.code==="KeyS") move.back=true;
        if(e.code==="KeyA") move.left=true;
        if(e.code==="KeyD") move.right=true;
    });

    document.addEventListener('keyup', e=>{
        if(e.code==="KeyW") move.forward=false;
        if(e.code==="KeyS") move.back=false;
        if(e.code==="KeyA") move.left=false;
        if(e.code==="KeyD") move.right=false;
    });

    animate();
}

function animate(){
    requestAnimationFrame(animate);

    if(controls.isLocked){

        direction.z = Number(move.forward) - Number(move.back);
        direction.x = Number(move.right) - Number(move.left);
        direction.normalize();

        if(move.forward || move.back)
            velocity.z -= direction.z * 0.1;

        if(move.left || move.right)
            velocity.x -= direction.x * 0.1;

        controls.moveRight(-velocity.x);
        controls.moveForward(-velocity.z);

        velocity.x *= 0.9;
        velocity.z *= 0.9;
    }

    renderer.render(scene, camera);
}
</script>

</body>
</html>
